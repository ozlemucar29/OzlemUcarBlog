{% extends 'blog/base.html' %}

{% block title %}Giriş Yap | Özlem Uçar{% endblock %}

{% block content %}
<div class="container" style="min-height: calc(100vh - 200px); display: flex; align-items: center; justify-content: center; padding: 4rem 0;">
    <div class="form-card" style="width: 100%; max-width: 450px; text-align: center;">
        <div class="about-avatar-wrapper" style="width: 80px; height: 80px; margin-bottom: 1.5rem; background: var(--badge-bg); border-color: var(--accent-color); display: flex; align-items: center; justify-content: center;">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        
        <h2 class="form-title" style="margin-bottom: 0.5rem;">Giriş Yap</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem;">Hesabınıza giriş yaparak paylaşımlara katılın.</p>
        
        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="form-group" style="text-align: left;">
                <label for="username">Kullanıcı Adı</label>
                <input type="text" id="username" name="username" required placeholder="Kullanıcı adınızı girin">
            </div>
            
            <div class="form-group" style="text-align: left; margin-bottom: 2rem;">
                <label for="password">Şifre</label>
                <input type="password" id="password" name="password" required placeholder="Şifrenizi girin">
            </div>
            
            <button type="submit" class="btn" style="width: 100%;">
                Giriş Yap
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
                    <polyline points="10 17 15 12 10 7"></polyline>
                    <line x1="15" y1="12" x2="3" y2="12"></line>
                </svg>
            </button>
        </form>
        
        <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--text-secondary);">
            Henüz hesabınız yok mu? <a href="{% url 'register' %}" style="color: var(--accent-color); font-weight: 600;">Kayıt Olun</a>
        </p>
    </div>
</div>
{% endblock %}
